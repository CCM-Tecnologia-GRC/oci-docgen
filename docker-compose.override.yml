services:
  api:
    ports: !reset []
    networks:
      - proxy
      - default
      
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.docgen-api.rule=Host(`api.docgen.ccm.local`)"
      - "traefik.http.routers.docgen-api.entrypoints=websecure"
      - "traefik.http.routers.docgen-api.tls=true"
      - "traefik.http.services.docgen-api.loadbalancer.server.port=8000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.docgen-api-http.rule=Host(`api.docgen.ccm.local`)"
      - "traefik.http.routers.docgen-api-http.entrypoints=web"
      - "traefik.http.routers.docgen-api-http.middlewares=docgen-api-https-redirect"
      - "traefik.http.middlewares.docgen-api-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.docgen-api-https-redirect.redirectscheme.permanent=true"
      - "traefik.docker.network=proxy"

  frontend:
    ports: !reset []
    volumes: !reset []
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.docgen-front.rule=Host(`docgen.ccm.local`)"
      - "traefik.http.routers.docgen-front.entrypoints=websecure"
      - "traefik.http.routers.docgen-front.tls=true"
      - "traefik.http.services.docgen-front.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.docgen-front-http.rule=Host(`docgen.ccm.local`)"
      - "traefik.http.routers.docgen-front-http.entrypoints=web"
      - "traefik.http.routers.docgen-front-http.middlewares=docgen-front-https-redirect"
      - "traefik.http.middlewares.docgen-front-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.docgen-front-https-redirect.redirectscheme.permanent=true"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
